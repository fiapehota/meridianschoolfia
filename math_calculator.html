<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meridian School — Калькулятор</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=Outfit:wght@400;500;600;700&display=swap');

:root{
  --lavender:#6A66A3;
  --lavender-deep:#785C84;
  --accent:#DE8602;
  --ink:#452316;
  --cream:#FBF6EE;
  --paper:#FFFFFF;
  --tint:#F1EEF9;
  --tint2:#E4E0F3;
}

*{box-sizing:border-box; margin:0; padding:0;}
body{
  font-family:'Outfit', sans-serif;
  background:var(--cream);
  min-height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:36px 16px;
  color:var(--ink);
}

.app{
  width:100%;
  max-width:420px;
  background:var(--paper);
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(69,35,22,0.12);
}

header{
  padding:22px 24px 16px;
  border-bottom:2px solid var(--lavender);
}
.logo{
  font-family:'Cormorant Garamond', serif;
  font-weight:600;
  font-size:26px;
  color:var(--ink);
}
.logo em{ font-style:italic; font-weight:400; color:var(--lavender); }
.subtitle{
  font-size:12px;
  font-weight:500;
  letter-spacing:1px;
  text-transform:uppercase;
  color:var(--lavender-deep);
  margin-top:4px;
}

.tabs{
  display:flex;
  gap:8px;
  padding:16px 24px 0;
}
.tab{
  flex:1;
  font-family:'Outfit', sans-serif;
  font-size:0.72rem;
  font-weight:600;
  letter-spacing:1px;
  text-transform:uppercase;
  padding:9px 10px;
  border-radius:20px;
  border:none;
  background:var(--tint2);
  color:var(--ink);
  cursor:pointer;
  transition:background .15s;
}
.tab.active{
  background:var(--accent);
  color:#fff;
  outline:2px solid var(--ink);
  outline-offset:1px;
}

.screen{
  margin:16px 24px 4px;
  background:var(--cream);
  border:1px solid var(--tint2);
  border-radius:14px;
  padding:14px 16px;
  min-height:96px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  gap:6px;
}
.expr{
  font-size:1.5rem;
  line-height:1.3;
  color:var(--ink);
  min-height:1.3em;
  word-wrap:break-word;
  text-align:right;
}
.expr.placeholder{ color:#b7aecb; font-size:1rem; }
.result{
  font-size:1.05rem;
  font-weight:600;
  color:var(--lavender-deep);
  text-align:right;
  white-space:pre-line;
  min-height:1.2em;
}
.result.error{ color:#a83232; font-weight:500; font-size:0.95rem; }

.frac{
  display:inline-flex;
  flex-direction:column;
  align-items:center;
  vertical-align:middle;
  margin:0 4px;
  line-height:1.15;
  font-size:0.85em;
}
.frac .num{ border-bottom:2px solid currentColor; padding:0 4px 2px; min-width:0.6em; text-align:center;}
.frac .den{ padding:2px 4px 0; min-width:0.6em; text-align:center;}

.sqrt{ display:inline-flex; align-items:flex-start; }
.sqrt::before{ content:'√'; font-size:1.05em; margin-right:1px; }
.rad-inner{ border-top:2px solid currentColor; padding:0 3px; }

.expr sup{ font-size:0.62em; }

.frac-toolbar{
  margin:0 24px;
  display:flex;
  gap:8px;
}
.frac-toolbar button{
  flex:1;
  font-family:'Outfit', sans-serif;
  font-size:0.72rem;
  font-weight:600;
  padding:8px;
  border:none;
  border-radius:10px;
  background:var(--lavender);
  color:#fff;
  cursor:pointer;
}

.hint{
  margin:10px 24px 0;
  font-size:0.68rem;
  color:#8b7f9c;
  text-align:right;
}

.keypad{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  padding:16px 24px 24px;
}
.keypad button{
  font-family:'Outfit', sans-serif;
  font-size:1.05rem;
  font-weight:500;
  padding:14px 0;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background:var(--tint);
  color:var(--ink);
  transition:transform .05s;
}
.keypad button:active{ transform:scale(0.95); }

.keypad button.btn-op{ background:var(--lavender-deep); color:#fff; }
.keypad button.btn-fn{ background:var(--lavender); color:#fff; font-size:0.95rem;}
.keypad button.btn-util{ background:var(--tint2); color:var(--ink); }
.keypad button.btn-equals{
  grid-column:span 4;
  background:var(--accent);
  color:#fff;
  font-weight:700;
  font-size:1.1rem;
  padding:16px 0;
  letter-spacing:0.5px;
}

[hidden]{ display:none !important; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">MERIDIAN <em>SCHOOL</em></div>
    <div class="subtitle">Калькулятор · дроби, корни, уравнения</div>
  </header>

  <div class="tabs">
    <button class="tab active" id="tabCalc" type="button">Вычислить</button>
    <button class="tab" id="tabSolve" type="button">Найти X</button>
  </div>

  <div class="screen">
    <div class="expr" id="exprDisplay"></div>
    <div class="result" id="resultDisplay"></div>
  </div>

  <div class="frac-toolbar" id="fracToolbar" hidden>
    <button type="button" id="fracNextBtn">▽ К знаменателю</button>
    <button type="button" id="fracDoneBtn">Готово ▷</button>
  </div>

  <div class="hint" id="modeHint">a/b — дробь · √ — корень · x² / xʸ — степень · % — процент</div>

  <div class="keypad" id="calcKeypad">
    <button class="btn-util" data-act="ac">AC</button>
    <button class="btn-util" data-act="back">⌫</button>
    <button class="btn-fn" data-act="percent">%</button>
    <button class="btn-op" data-act="op" data-val="÷">÷</button>

    <button class="btn-fn" data-act="paren-open">(</button>
    <button class="btn-fn" data-act="paren-close">)</button>
    <button class="btn-fn" data-act="sqrt">√</button>
    <button class="btn-op" data-act="op" data-val="×">×</button>

    <button data-act="digit" data-val="7">7</button>
    <button data-act="digit" data-val="8">8</button>
    <button data-act="digit" data-val="9">9</button>
    <button class="btn-op" data-act="op" data-val="−">−</button>

    <button data-act="digit" data-val="4">4</button>
    <button data-act="digit" data-val="5">5</button>
    <button data-act="digit" data-val="6">6</button>
    <button class="btn-op" data-act="op" data-val="+">+</button>

    <button data-act="digit" data-val="1">1</button>
    <button data-act="digit" data-val="2">2</button>
    <button data-act="digit" data-val="3">3</button>
    <button class="btn-fn" data-act="pow2">x²</button>

    <button class="btn-fn" data-act="frac">a/b</button>
    <button data-act="digit" data-val="0">0</button>
    <button data-act="digit" data-val=".">.</button>
    <button class="btn-fn" data-act="powy">xʸ</button>

    <button class="btn-equals" data-act="equals">=</button>
  </div>

  <div class="keypad" id="solveKeypad" hidden>
    <button class="btn-util" data-act="ac">AC</button>
    <button class="btn-util" data-act="back">⌫</button>
    <button class="btn-fn" data-act="var">x</button>
    <button class="btn-fn" data-act="pow2">x²</button>

    <button class="btn-fn" data-act="paren-open">(</button>
    <button class="btn-fn" data-act="paren-close">)</button>
    <button class="btn-op" data-act="op" data-val="÷">÷</button>
    <button class="btn-op" data-act="op" data-val="×">×</button>

    <button data-act="digit" data-val="7">7</button>
    <button data-act="digit" data-val="8">8</button>
    <button data-act="digit" data-val="9">9</button>
    <button class="btn-op" data-act="op" data-val="−">−</button>

    <button data-act="digit" data-val="4">4</button>
    <button data-act="digit" data-val="5">5</button>
    <button data-act="digit" data-val="6">6</button>
    <button class="btn-op" data-act="op" data-val="+">+</button>

    <button data-act="digit" data-val="1">1</button>
    <button data-act="digit" data-val="2">2</button>
    <button data-act="digit" data-val="3">3</button>
    <button class="btn-fn" data-act="op" data-val="=">=</button>

    <button class="btn-fn" data-act="frac">a/b</button>
    <button data-act="digit" data-val="0">0</button>
    <button data-act="digit" data-val=".">.</button>
    <button class="btn-util" data-act="back" style="visibility:hidden">⌫</button>

    <button class="btn-equals" data-act="solve">Найти X ⇒</button>
  </div>
</div>

<script>
(function(){
  "use strict";

  function makeState(){
    return { raw:'', fractions:[], cursor:'main', activeFrac:null, result:'', error:'' };
  }
  const calcState = makeState();
  const solveState = makeState();
  let mode = 'calc';
  function getState(){ return mode==='calc' ? calcState : solveState; }

  // ---------- tokenizer (shared) ----------
  function tokenize(str){
    const tokens=[];
    let i=0;
    while(i<str.length){
      const c=str[i];
      if(c===' '){ i++; continue; }
      if(/[0-9.]/.test(c)){
        let j=i, num='';
        while(j<str.length && /[0-9.]/.test(str[j])){ num+=str[j]; j++; }
        tokens.push({type:'num', value:parseFloat(num)});
        i=j; continue;
      }
      if(c==='x'||c==='X'){ tokens.push({type:'var'}); i++; continue; }
      if(c==='+'){ tokens.push({type:'+'}); i++; continue; }
      if(c==='−'||c==='-'){ tokens.push({type:'-'}); i++; continue; }
      if(c==='×'||c==='*'){ tokens.push({type:'*'}); i++; continue; }
      if(c==='÷'||c==='/'){ tokens.push({type:'/'}); i++; continue; }
      if(c==='^'){ tokens.push({type:'^'}); i++; continue; }
      if(c==='%'){ tokens.push({type:'%'}); i++; continue; }
      if(c==='('){ tokens.push({type:'('}); i++; continue; }
      if(c===')'){ tokens.push({type:')'}); i++; continue; }
      if(c==='√'){ tokens.push({type:'sqrt'}); i++; continue; }
      if(c==='='){ tokens.push({type:'='}); i++; continue; }
      throw new Error('Неизвестный символ: '+c);
    }
    return tokens;
  }

  function insertImplicitMul(tokens){
    const out=[];
    const endsValue={num:1,var:1,')':1};
    const startsValue={num:1,var:1,'(':1,sqrt:1};
    for(let i=0;i<tokens.length;i++){
      const t=tokens[i];
      if(out.length){
        const prev=out[out.length-1];
        if(endsValue[prev.type] && startsValue[t.type]) out.push({type:'*'});
      }
      out.push(t);
    }
    return out;
  }

  // ---------- numeric evaluator (Calculate mode) ----------
  function evalNumeric(tokens){
    let pos=0;
    function peek(){ return tokens[pos]; }
    function next(){ return tokens[pos++]; }
    function expect(type){ if(!peek()||peek().type!==type) throw new Error('Ожидалась «'+type+'»'); next(); }
    function parseExpr(){
      let v=parseTerm();
      while(peek() && (peek().type==='+'||peek().type==='-')){
        const op=next().type; const rhs=parseTerm();
        v = op==='+' ? v+rhs : v-rhs;
      }
      return v;
    }
    function parseTerm(){
      let v=parseUnary();
      while(peek() && (peek().type==='*'||peek().type==='/')){
        const op=next().type; const rhs=parseUnary();
        if(op==='/'){ if(rhs===0) throw new Error('Деление на 0'); v=v/rhs; } else v=v*rhs;
      }
      return v;
    }
    function parseUnary(){
      if(peek() && peek().type==='-'){ next(); return -parseUnary(); }
      if(peek() && peek().type==='+'){ next(); return parseUnary(); }
      return parsePow();
    }
    function parsePow(){
      let base=parsePercent();
      if(peek() && peek().type==='^'){
        next();
        const exp=parseUnary();
        base=Math.pow(base, exp);
      }
      return base;
    }
    function parsePercent(){
      let v=parsePrimary();
      while(peek() && peek().type==='%'){ next(); v=v/100; }
      return v;
    }
    function parsePrimary(){
      const t=peek();
      if(!t) throw new Error('Неожиданный конец выражения');
      if(t.type==='num'){ next(); return t.value; }
      if(t.type==='('){ next(); const v=parseExpr(); expect(')'); return v; }
      if(t.type==='sqrt'){
        next(); expect('(');
        const v=parseExpr(); expect(')');
        if(v<0) throw new Error('Корень из отрицательного числа');
        return Math.sqrt(v);
      }
      if(t.type==='var') throw new Error('X недоступен в режиме «Вычислить»');
      throw new Error('Ожидалось число');
    }
    const result=parseExpr();
    if(pos!==tokens.length) throw new Error('Лишние символы в выражении');
    return result;
  }

  // ---------- polynomial helpers (Solve mode, degree <= 2) ----------
  function trimPoly(a){ const r=a.slice(); while(r.length>1 && Math.abs(r[r.length-1])<1e-9) r.pop(); return r; }
  function pConst(n){ return [n]; }
  function pX(){ return [0,1]; }
  function pAdd(a,b){ const len=Math.max(a.length,b.length); const r=[]; for(let i=0;i<len;i++) r.push((a[i]||0)+(b[i]||0)); return trimPoly(r); }
  function pNeg(a){ return a.map(c=>-c); }
  function pSub(a,b){ return pAdd(a,pNeg(b)); }
  function pMul(a,b){
    const r=new Array(a.length+b.length-1).fill(0);
    for(let i=0;i<a.length;i++) for(let j=0;j<b.length;j++) r[i+j]+=a[i]*b[j];
    const t=trimPoly(r);
    if(t.length>3) throw new Error('Поддерживаются уравнения не выше 2-й степени (с x²)');
    return t;
  }
  function pDiv(a,b){
    if(b.length>1) throw new Error('Деление на выражение с X не поддерживается');
    const d=b[0];
    if(Math.abs(d)<1e-12) throw new Error('Деление на 0');
    return a.map(c=>c/d);
  }
  function pPow(a,n){
    if(!Number.isInteger(n) || n<0) throw new Error('Показатель степени должен быть целым неотрицательным числом');
    let r=[1];
    for(let i=0;i<n;i++) r=pMul(r,a);
    return r;
  }

  function parsePolyTokens(tokens){
    let pos=0;
    function peek(){ return tokens[pos]; }
    function next(){ return tokens[pos++]; }
    function expect(type){ if(!peek()||peek().type!==type) throw new Error('Ожидалась «'+type+'»'); next(); }
    function parseExpr(){
      let v=parseTerm();
      while(peek() && (peek().type==='+'||peek().type==='-')){
        const op=next().type; const rhs=parseTerm();
        v = op==='+' ? pAdd(v,rhs) : pSub(v,rhs);
      }
      return v;
    }
    function parseTerm(){
      let v=parseUnary();
      while(peek() && (peek().type==='*'||peek().type==='/')){
        const op=next().type; const rhs=parseUnary();
        v = op==='*' ? pMul(v,rhs) : pDiv(v,rhs);
      }
      return v;
    }
    function parseUnary(){
      if(peek() && peek().type==='-'){ next(); return pNeg(parseUnary()); }
      if(peek() && peek().type==='+'){ next(); return parseUnary(); }
      return parsePow();
    }
    function parsePow(){
      let base=parsePrimary();
      if(peek() && peek().type==='^'){
        next();
        const expTok=next();
        if(!expTok || expTok.type!=='num') throw new Error('Показатель степени должен быть числом');
        base=pPow(base, expTok.value);
      }
      return base;
    }
    function parsePrimary(){
      const t=peek();
      if(!t) throw new Error('Неожиданный конец выражения');
      if(t.type==='num'){ next(); return pConst(t.value); }
      if(t.type==='var'){ next(); return pX(); }
      if(t.type==='('){ next(); const v=parseExpr(); expect(')'); return v; }
      if(t.type==='sqrt') throw new Error('√ не поддерживается в уравнениях');
      throw new Error('Ожидалось число или X');
    }
    const v=parseExpr();
    if(pos!==tokens.length) throw new Error('Лишние символы в уравнении');
    return v;
  }

  function solveEquationStr(str){
    const tokens=insertImplicitMul(tokenize(str));
    const eqIdx=[];
    tokens.forEach((t,i)=>{ if(t.type==='=') eqIdx.push(i); });
    if(eqIdx.length!==1) throw new Error('Уравнение должно содержать ровно один знак «=»');
    const lhsTokens=tokens.slice(0,eqIdx[0]);
    const rhsTokens=tokens.slice(eqIdx[0]+1);
    if(lhsTokens.length===0 || rhsTokens.length===0) throw new Error('Заполните обе части уравнения');
    const lhs=parsePolyTokens(lhsTokens);
    const rhs=parsePolyTokens(rhsTokens);
    const diff=pSub(lhs,rhs);
    const c0=diff[0]||0, c1=diff[1]||0, c2=diff[2]||0;

    if(Math.abs(c2)<1e-9){
      if(Math.abs(c1)<1e-9){
        if(Math.abs(c0)<1e-9) return {type:'infinite'};
        return {type:'none'};
      }
      return {type:'linear', x:-c0/c1};
    }
    const a=c2,b=c1,c=c0;
    const D=b*b-4*a*c;
    if(D>1e-9){
      const sq=Math.sqrt(D);
      return {type:'quad2', x1:(-b+sq)/(2*a), x2:(-b-sq)/(2*a), D};
    }
    if(Math.abs(D)<=1e-9) return {type:'quad1', x:-b/(2*a), D:0};
    return {type:'quadComplex', re:-b/(2*a), im:Math.sqrt(-D)/(2*a), D};
  }

  function describeSolution(sol){
    switch(sol.type){
      case 'linear': return 'x = '+fmt(sol.x);
      case 'none': return 'Решений нет';
      case 'infinite': return 'x — любое число (тождество)';
      case 'quad2': return 'D = '+fmt(sol.D)+'\nx₁ = '+fmt(sol.x1)+',  x₂ = '+fmt(sol.x2);
      case 'quad1': return 'D = 0\nx = '+fmt(sol.x);
      case 'quadComplex': return 'D = '+fmt(sol.D)+' < 0 — действительных корней нет';
    }
  }

  function fmt(n){
    if(!isFinite(n)) return '∞';
    let r=Math.round(n*1e9)/1e9;
    if(Object.is(r,-0)) r=0;
    let s=r.toString();
    if(s.length>14) s=parseFloat(r.toPrecision(10)).toString();
    return s;
  }

  // ---------- fraction helpers ----------
  function resolveFractions(raw, fractions){
    return raw.replace(/(\d+)/g, function(m, idxStr){
      const f=fractions[parseInt(idxStr,10)];
      const num=(f && f.num) ? f.num : '0';
      const den=(f && f.den) ? f.den : '1';
      return '(('+num+')/('+den+'))';
    });
  }
  function autoBalance(str){
    let open=0;
    for(const ch of str){ if(ch==='(') open++; else if(ch===')') open=Math.max(0,open-1); }
    return str + ')'.repeat(open);
  }

  // ---------- display rendering ----------
  function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function renderToHTML(str, fractions){
    let html='';
    let i=0;
    while(i<str.length){
      const c=str[i];
      if(c===''){
        let j=i+1, idxStr='';
        while(j<str.length && str[j]!==''){ idxStr+=str[j]; j++; }
        const f=fractions[parseInt(idxStr,10)] || {num:'',den:''};
        html += '<span class="frac"><span class="num">'+(renderToHTML(f.num||'0', fractions))+'</span><span class="den">'+(renderToHTML(f.den||'0', fractions))+'</span></span>';
        i=j+1;
        continue;
      }
      if(c==='√'){
        if(str[i+1]==='('){
          let depth=1, k=i+2;
          while(k<str.length && depth>0){
            if(str[k]==='(') depth++;
            else if(str[k]===')') depth--;
            if(depth>0) k++;
          }
          const inner=str.slice(i+2,k);
          html += '<span class="sqrt"><span class="rad-inner">'+renderToHTML(inner, fractions)+'</span></span>';
          i=k+1;
          continue;
        }
        html += '√'; i++; continue;
      }
      if(c==='^'){
        let k=i+1, exp='';
        if(str[k]==='('){
          let depth=1; exp+='('; k++;
          while(k<str.length && depth>0){
            if(str[k]==='(') depth++;
            else if(str[k]===')') depth--;
            exp+=str[k];
            if(depth>0) k++; else k++;
          }
        } else {
          if(str[k]==='-'){ exp+='-'; k++; }
          while(k<str.length && /[0-9.]/.test(str[k])){ exp+=str[k]; k++; }
        }
        html += '<sup>'+renderToHTML(exp, fractions)+'</sup>';
        i=k;
        continue;
      }
      let j=i, run='';
      while(j<str.length && str[j]!=='' && str[j]!=='√' && str[j]!=='^'){ run+=str[j]; j++; }
      html += escapeHtml(run);
      i=j;
    }
    return html;
  }

  // ---------- state mutation ----------
  function appendToState(st, s){
    if(st.cursor==='main') st.raw += s;
    else if(st.cursor==='num') st.fractions[st.activeFrac].num += s;
    else st.fractions[st.activeFrac].den += s;
    st.error=''; st.result='';
  }
  function startFraction(st){
    if(st.cursor!=='main') return;
    const idx=st.fractions.length;
    st.fractions.push({num:'',den:''});
    st.raw += ''+idx+'';
    st.cursor='num'; st.activeFrac=idx;
  }
  function fracNext(st){ if(st.cursor==='num') st.cursor='den'; }
  function fracDone(st){ if(st.cursor==='den'){ st.cursor='main'; st.activeFrac=null; } }
  function backspace(st){
    if(st.cursor==='main'){
      const m=st.raw.match(/\d+$/);
      if(m) st.raw=st.raw.slice(0,-m[0].length);
      else st.raw=st.raw.slice(0,-1);
    } else if(st.cursor==='num'){
      const f=st.fractions[st.activeFrac];
      if(f.num.length>0) f.num=f.num.slice(0,-1);
      else {
        st.raw=st.raw.replace(''+st.activeFrac+'','');
        st.cursor='main'; st.activeFrac=null;
      }
    } else {
      const f=st.fractions[st.activeFrac];
      if(f.den.length>0) f.den=f.den.slice(0,-1);
      else st.cursor='num';
    }
    st.error=''; st.result='';
  }
  function clearState(st){ st.raw=''; st.fractions=[]; st.cursor='main'; st.activeFrac=null; st.result=''; st.error=''; }

  function doEquals(st){
    try{
      const resolved=autoBalance(resolveFractions(st.raw, st.fractions));
      if(!resolved.trim()) return;
      const tokens=insertImplicitMul(tokenize(resolved));
      const val=evalNumeric(tokens);
      st.result=fmt(val);
      st.error='';
      st.raw=fmt(val);
      st.fractions=[]; st.cursor='main'; st.activeFrac=null;
    }catch(err){ st.error=err.message; st.result=''; }
  }
  function doSolve(st){
    try{
      const resolved=autoBalance(resolveFractions(st.raw, st.fractions));
      const sol=solveEquationStr(resolved);
      st.result=describeSolution(sol);
      st.error='';
    }catch(err){ st.error=err.message; st.result=''; }
  }

  // ---------- rendering ----------
  const exprDisplay=document.getElementById('exprDisplay');
  const resultDisplay=document.getElementById('resultDisplay');
  const fracToolbar=document.getElementById('fracToolbar');
  const fracNextBtn=document.getElementById('fracNextBtn');
  const fracDoneBtn=document.getElementById('fracDoneBtn');
  const tabCalc=document.getElementById('tabCalc');
  const tabSolve=document.getElementById('tabSolve');
  const calcKeypad=document.getElementById('calcKeypad');
  const solveKeypad=document.getElementById('solveKeypad');
  const modeHint=document.getElementById('modeHint');

  function render(){
    const st=getState();
    if(st.raw===''){
      exprDisplay.classList.add('placeholder');
      exprDisplay.textContent = mode==='calc' ? '0' : 'Например: 2x + 3 = 7';
    } else {
      exprDisplay.classList.remove('placeholder');
      exprDisplay.innerHTML = renderToHTML(st.raw, st.fractions);
    }
    if(st.error){
      resultDisplay.textContent = st.error;
      resultDisplay.classList.add('error');
    } else {
      resultDisplay.textContent = st.result;
      resultDisplay.classList.remove('error');
    }

    if(st.cursor==='num'){ fracToolbar.hidden=false; fracNextBtn.hidden=false; fracDoneBtn.hidden=true; }
    else if(st.cursor==='den'){ fracToolbar.hidden=false; fracNextBtn.hidden=true; fracDoneBtn.hidden=false; }
    else { fracToolbar.hidden=true; }

    tabCalc.classList.toggle('active', mode==='calc');
    tabSolve.classList.toggle('active', mode==='solve');
    calcKeypad.hidden = mode!=='calc';
    solveKeypad.hidden = mode!=='solve';
    modeHint.textContent = mode==='calc'
      ? 'a/b — дробь · √ — корень · x² / xʸ — степень · % — процент'
      : 'Поддерживаются линейные и квадратные уравнения (до x²)';
  }

  function handleAction(ds){
    const st=getState();
    switch(ds.act){
      case 'digit': appendToState(st, ds.val); break;
      case 'op': appendToState(st, ds.val); break;
      case 'paren-open': appendToState(st, '('); break;
      case 'paren-close': appendToState(st, ')'); break;
      case 'percent': appendToState(st, '%'); break;
      case 'sqrt': appendToState(st, '√('); break;
      case 'pow2': appendToState(st, '^2'); break;
      case 'powy': appendToState(st, '^'); break;
      case 'var': appendToState(st, 'x'); break;
      case 'frac': startFraction(st); break;
      case 'back': backspace(st); break;
      case 'ac': clearState(st); break;
      case 'equals': doEquals(st); break;
      case 'solve': doSolve(st); break;
    }
    render();
  }

  calcKeypad.addEventListener('click', function(e){
    const btn=e.target.closest('button'); if(!btn) return;
    handleAction(btn.dataset);
  });
  solveKeypad.addEventListener('click', function(e){
    const btn=e.target.closest('button'); if(!btn) return;
    handleAction(btn.dataset);
  });
  fracNextBtn.addEventListener('click', function(){ fracNext(getState()); render(); });
  fracDoneBtn.addEventListener('click', function(){ fracDone(getState()); render(); });

  tabCalc.addEventListener('click', function(){ mode='calc'; render(); });
  tabSolve.addEventListener('click', function(){ mode='solve'; render(); });

  document.addEventListener('keydown', function(e){
    const st=getState();
    if(/^[0-9]$/.test(e.key)){ appendToState(st, e.key); render(); return; }
    if(e.key==='.'){ appendToState(st, '.'); render(); return; }
    if(e.key==='+'){ appendToState(st, '+'); render(); return; }
    if(e.key==='-'){ appendToState(st, '−'); render(); return; }
    if(e.key==='*'){ appendToState(st, '×'); render(); return; }
    if(e.key==='/'){ appendToState(st, '÷'); render(); return; }
    if(e.key==='^'){ appendToState(st, '^'); render(); return; }
    if(e.key==='%'){ appendToState(st, '%'); render(); return; }
    if(e.key==='('){ appendToState(st, '('); render(); return; }
    if(e.key===')'){ appendToState(st, ')'); render(); return; }
    if(mode==='solve' && (e.key==='x'||e.key==='X')){ appendToState(st, 'x'); render(); return; }
    if(mode==='solve' && e.key==='='){ appendToState(st, '='); render(); return; }
    if(e.key==='Backspace'){ e.preventDefault(); backspace(st); render(); return; }
    if(e.key==='Escape'){ clearState(st); render(); return; }
    if(e.key==='Enter'){ e.preventDefault(); if(mode==='calc') doEquals(st); else doSolve(st); render(); return; }
  });

  render();
})();
</script>
</body>
</html>
