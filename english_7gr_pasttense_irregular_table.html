  .count{font-size:0.8rem;color:var(--muted);margin-top:6px;}

  table{
    width:100%;border-collapse:collapse;border:1.5px solid var(--border);
    border-radius:14px;overflow:hidden;
  }
  thead th{
    background:var(--border);color:var(--heading);

  .empty-cell{color:var(--muted);font-style:italic;}

  }

const tbody = document.getElementById('tbody');
const countEl = document.getElementById('count');
const noResults = document.getElementById('noResults');

function cell(word, tr){
  if(!word) return '<span class="empty-cell">—</span>';
  return `${word}${tr ? `<span class="tr">[${tr}]</span>` : ''}`;
}

function render(filter){
  tbody.innerHTML='';
  const q = filter.trim().toLowerCase();
  const filtered = VERBS.filter(v =>
    !q || v[0].includes(q) || v[2].toLowerCase().includes(q) || v[4].toLowerCase().includes(q) || v[6].toLowerCase().includes(q)
  );
  filtered.forEach(v=>{
    const tr=document.createElement('tr');
    tr.innerHTML = `<td class="base">${cell(v[0],v[1])}</td><td>${cell(v[2],v[3])}</td><td>${cell(v[4],v[5])}</td><td class="ru">${v[6]}</td>`;
    tbody.appendChild(tr);
  });
  countEl.textContent = `${filtered.length} of ${VERBS.length} verbs`;
  noResults.style.display = filtered.length ? 'none' : 'block';
}

document.getElementById('search').addEventListener('input', e => render(e.target.value));
